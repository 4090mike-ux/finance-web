<!--
  파일명: templates/base.html
  역할: 모든 페이지의 공통 뼈대(레이아웃)
        네비게이션 바, 푸터를 여기 한 번만 작성하면
        모든 페이지에 자동으로 적용됨
-->
<!DOCTYPE html>
<!-- 이 파일이 HTML5 문서임을 브라우저에 알림 -->
<html lang="ko">
<!-- lang="ko" = 이 페이지 언어가 한국어임을 명시 -->
<head>
  <!-- 한글이 깨지지 않도록 UTF-8 인코딩 설정 -->
  <meta charset="UTF-8" />

  <!-- 모바일에서도 화면이 정상적으로 보이도록 반응형 설정 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!--
    {% block title %} = Jinja2 템플릿 문법
    자식 페이지(stock.html 등)가 이 부분을 덮어씌울 수 있음
    덮어씌우지 않으면 기본값 "금융 통합 분석" 표시
  -->
  <title>{% block title %}금융 통합 분석{% endblock %}</title>

  <!-- Tailwind CSS CDN: 인터넷에서 Tailwind를 불러옴 -->
  <!-- 설치 없이 class="bg-gray-900" 같은 스타일 바로 사용 가능 -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- 커스텀 CSS 파일 연결 (static/css/style.css) -->
  <!-- url_for = Flask가 static 폴더 경로를 자동으로 찾아줌 -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>

<!--
  body 클래스 설명:
  bg-gray-950  = 배경색 거의 검정
  text-white   = 기본 글씨색 흰색
  min-h-screen = 최소 높이를 화면 전체로 설정
  flex flex-col = 세로 방향 배치 (nav → main → footer 순서)
-->
<body class="bg-gray-950 text-white min-h-screen flex flex-col">

  <!-- =====================
       네비게이션 바 (모든 페이지 상단)
       ===================== -->
  <nav class="bg-gray-900 border-b border-gray-700 px-6 py-3 flex items-center justify-between">
  <!--
    bg-gray-900     = 진한 회색 배경
    border-b        = 아래쪽 테두리
    px-6 py-3       = 좌우 패딩 6, 위아래 패딩 3
    justify-between = 로고 왼쪽, 로그인 오른쪽으로 배치
  -->

    <!-- 로고: 클릭 시 메인 페이지(/)로 이동 -->
    <a href="/" class="text-xl font-bold text-blue-400">💰 Finance Hub</a>

    <!-- 메뉴 링크들 (가로로 나란히 배치) -->
    <div class="flex gap-6 text-sm font-medium">
      <!-- hover:text-색상 = 마우스를 올렸을 때 색상 변경 -->
      <!-- transition = 색상 변경이 부드럽게 애니메이션 적용 -->
      <a href="/stock"    class="hover:text-blue-400 transition">📈 주식</a>
      <a href="/coin"     class="hover:text-yellow-400 transition">🪙 코인</a>
      <a href="/bank"     class="hover:text-green-400 transition">🏦 은행</a>
      <a href="/realty"   class="hover:text-orange-400 transition">🏠 부동산</a>
      <a href="/analysis" class="hover:text-purple-400 transition">🧠 분석</a>
    </div>

    <!-- 로그인 / 회원가입 버튼 -->
    <div class="flex gap-3 text-sm">
      <!-- 로그인: 테두리만 있는 버튼 -->
      <a href="/login"    class="px-3 py-1 border border-gray-500 rounded hover:border-blue-400 transition">로그인</a>
      <!-- 회원가입: 파란 배경 버튼 -->
      <a href="/register" class="px-3 py-1 bg-blue-600 rounded hover:bg-blue-500 transition">회원가입</a>
    </div>
  </nav>

  <!-- =====================
       메인 콘텐츠 영역
       각 페이지의 내용이 여기에 삽입됨
       flex-1 = 남은 공간을 모두 차지 (footer가 항상 맨 아래)
       ===================== -->
  <main class="flex-1 p-6">
    <!--
      {% block content %}{% endblock %}
      = 자식 페이지에서 작성한 내용이 여기에 채워짐
      예: stock.html의 {% block content %} ... {% endblock %} 내용
    -->
    {% block content %}{% endblock %}
  </main>

  <!-- =====================
       푸터 (모든 페이지 하단)
       법적 면책 문구 — 자본시장법 위반 방지
       투자 권유 서비스가 아님을 명시
       ===================== -->
  <footer class="bg-gray-900 border-t border-gray-700 px-6 py-4 text-center text-xs text-gray-500">
    본 서비스는 정보 제공 목적으로만 운영되며, 투자 권유 또는 자문을 제공하지 않습니다.<br>
    모든 투자 결정과 그 결과는 이용자 본인에게 있습니다. 제공되는 데이터는 실시간이 아닐 수 있으며 정확성을 보장하지 않습니다.
  </footer>

</body>
</html>

{% extends "base.html" %}
{% block title %}회원가입 — Finance Hub{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-20">
  <div class="bg-gray-800 rounded-xl p-8 border border-gray-700">

    <h1 class="text-2xl font-bold text-center mb-6">회원가입</h1>

    <form method="POST" action="/register" class="flex flex-col gap-4">

      <div>
        <label class="text-sm text-gray-400 mb-1 block">닉네임</label>
        <input type="text" name="nickname" required
          class="w-full bg-gray-900 border border-gray-600 rounded-lg px-4 py-2 focus:outline-none focus:border-blue-500"
          placeholder="닉네임 입력" />
      </div>

      <div>
        <label class="text-sm text-gray-400 mb-1 block">이메일</label>
        <input type="email" name="email" required
          class="w-full bg-gray-900 border border-gray-600 rounded-lg px-4 py-2 focus:outline-none focus:border-blue-500"
          placeholder="example@email.com" />
      </div>

      <div>
        <label class="text-sm text-gray-400 mb-1 block">비밀번호</label>
        <input type="password" name="password" required
          class="w-full bg-gray-900 border border-gray-600 rounded-lg px-4 py-2 focus:outline-none focus:border-blue-500"
          placeholder="8자 이상 입력" />
      </div>

      <!-- 개인정보 동의 (법적 필수) -->
      <div class="flex items-start gap-2 mt-2">
        <input type="checkbox" name="agree" id="agree" required class="mt-1" />
        <label for="agree" class="text-sm text-gray-400">
          <a href="/privacy" class="text-blue-400 hover:underline">개인정보처리방침</a> 및
          <a href="/terms"   class="text-blue-400 hover:underline">이용약관</a>에 동의합니다. (필수)
        </label>
      </div>

      <button type="submit"
        class="w-full bg-blue-600 hover:bg-blue-500 rounded-lg py-2 font-bold transition mt-2">
        가입하기
      </button>

    </form>

    <p class="text-center text-sm text-gray-400 mt-4">
      이미 계정이 있으신가요?
      <a href="/login" class="text-blue-400 hover:underline">로그인</a>
    </p>

  </div>
</div>
{% endblock %}
